name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, mbstring, openssl
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
      - name: PHP syntax
        run: |
          find api tools tests/php -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: PHP integration
        env:
          APP_ENV: development
          APP_SECRET: ci-secret-with-more-than-thirty-two-characters
        run: php tests/php/integration.php
      - name: PHP HTTP integration
        env:
          APP_ENV: development
          APP_SECRET: ci-secret-with-more-than-thirty-two-characters
          APP_DATA_DIR: ${{ runner.temp }}/jt-http-data
          MAIL_TRANSPORT: spool
          SITE_URL: http://127.0.0.1:8099
          REZIO_DEFAULT_URL: https://demo.rezio.shop/products/default
          REZIO_ROUTE_URLS_JSON: '{"kyoto":"https://demo.rezio.shop/products/kyoto"}'
        run: |
          trap 'echo "::group::PHP server log"; cat "${{ runner.temp }}/php-server.log" || true; echo "::endgroup::"; kill "$(cat "${{ runner.temp }}/php-server.pid")" 2>/dev/null || true' EXIT
          php -S 127.0.0.1:8099 -t . > "${{ runner.temp }}/php-server.log" 2>&1 &
          echo $! > "${{ runner.temp }}/php-server.pid"
          sleep 2
          php tests/php/http_integration.php http://127.0.0.1:8099
          kill "$(cat "${{ runner.temp }}/php-server.pid")"
          trap - EXIT
      - name: SMTP integration
        run: |
          python tests/smtp_server.py > "${{ runner.temp }}/smtp.log" 2>&1 &
          echo $! > "${{ runner.temp }}/smtp.pid"
          sleep 1
          php tests/php/smtp.php
          kill "$(cat "${{ runner.temp }}/smtp.pid")"
      - name: Rezio CSV business rules
        run: php tests/php/rezio_csv.php
      - name: CSV dry run
        env:
          APP_ENV: development
          APP_SECRET: ci-secret-with-more-than-thirty-two-characters
          APP_DATA_DIR: ${{ runner.temp }}/jt-data
        run: php tools/import-rezio-csv.php docs/examples/rezio-orders-sample.csv --dry-run
      - name: Sensitive scan
        run: |
          ! grep -RInE "(SMTP_PASSWORD=.+[A-Za-z0-9]|api[_-]?key[=:].+|BEGIN RSA|PRIVATE KEY)" --exclude-dir=.git --exclude-dir=node_modules --exclude=.env.example .
