
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>关西景点资料库 | japan-travel.info</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #162f3a;
      --muted: #657682;
      --line: rgba(24, 50, 59, .14);
      --paper: #fffaf2;
      --soft: #edf6f3;
      --sea: #0d7693;
      --forest: #407b5f;
      --sun: #e3a23a;
      --shadow: 0 18px 44px rgba(29, 54, 61, .14);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 250, 242, .88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .top-inner {
      width: min(100% - 36px, 1180px);
      height: 70px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      display: grid;
      gap: 2px;
      font-weight: 900;
      letter-spacing: 0;
    }
    .brand span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill, .lang button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      color: var(--ink);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }
    .lang {
      display: flex;
      gap: 3px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.62);
    }
    .lang button {
      border: 0;
      padding: 6px 9px;
      background: transparent;
      color: #5b707c;
    }
    .lang button.active {
      background: var(--ink);
      color: white;
    }

    .hero {
      width: min(100% - 36px, 1180px);
      margin: 0 auto;
      padding: 48px 0 28px;
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(320px, .7fr);
      gap: 36px;
      align-items: end;
    }
    .hero h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(38px, 6vw, 78px);
      line-height: .98;
      letter-spacing: 0;
    }
    .hero p {
      margin: 20px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
      font-weight: 650;
    }
    .layout {
      width: min(100% - 36px, 1180px);
      margin: 0 auto 70px;
      display: grid;
      grid-template-columns: minmax(320px, .78fr) minmax(0, 1.22fr);
      gap: 24px;
      align-items: start;
    }
    .library, .detail {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.64);
      box-shadow: var(--shadow);
    }
    .library {
      position: sticky;
      top: 88px;
      max-height: calc(100svh - 110px);
      display: flex;
      flex-direction: column;
      min-height: 620px;
    }
    .tools {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 14px;
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      padding: 12px 13px;
      outline: none;
      font-weight: 750;
    }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter {
      border: 1px solid var(--line);
      background: #f7fbfa;
      border-radius: 999px;
      color: #4d6571;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
    }
    .filter.active {
      background: var(--sea);
      border-color: var(--sea);
      color: white;
    }
    .grid {
      padding: 16px;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .spot-card {
      display: grid;
      grid-template-rows: 112px auto;
      border: 1px solid rgba(24,50,59,.12);
      background: white;
      border-radius: 8px;
      overflow: hidden;
      min-height: 198px;
    }
    .spot-card.active {
      outline: 3px solid rgba(13, 118, 147, .26);
      border-color: rgba(13, 118, 147, .7);
    }
    .spot-card img {
      width: 100%;
      height: 112px;
      object-fit: cover;
      display: block;
    }
    .spot-card div {
      padding: 11px;
      display: grid;
      gap: 7px;
    }
    .spot-card strong {
      font-size: 15px;
      line-height: 1.28;
      letter-spacing: 0;
    }
    .spot-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .detail {
      min-height: 620px;
      overflow: hidden;
    }
    body.spot-detail-page .hero {
      display: none;
    }
    body.spot-detail-page .layout {
      grid-template-columns: minmax(0, 1fr);
      margin-top: 34px;
    }
    body.spot-detail-page .library {
      display: none;
    }
    body.spot-detail-page .detail {
      min-height: 0;
      overflow: visible;
    }
    body.spot-detail-page .detail-hero img {
      height: min(64svh, 560px);
      max-height: none;
    }
    @media (min-width: 981px) {
      .detail {
        position: sticky;
        top: 88px;
        max-height: calc(100svh - 110px);
        overflow: auto;
      }
      body.spot-detail-page .detail {
        position: static;
        max-height: none;
        overflow: visible;
      }
    }
    .detail-hero {
      position: relative;
      min-height: 360px;
      background: #d8e8e8;
    }
    .detail-hero img {
      width: 100%;
      height: 430px;
      max-height: 54svh;
      object-fit: cover;
      display: block;
    }
    .detail-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 32%, rgba(8,28,34,.76) 100%);
      pointer-events: none;
    }
    .detail-title {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 24px;
      z-index: 1;
      color: white;
    }
    .detail-title h2 {
      margin: 0;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .meta span, .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(255,255,255,.2);
      color: inherit;
      font-size: 12px;
      font-weight: 900;
    }
    .detail-body {
      padding: 24px 28px 30px;
      display: grid;
      gap: 20px;
    }
    .lead {
      margin: 0;
      color: #445d68;
      font-size: 17px;
      line-height: 1.8;
      font-weight: 650;
    }
    .section {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      display: grid;
      gap: 12px;
    }
    .section h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .script {
      margin: 0;
      color: #526a75;
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .audio-row {
      display: grid;
      gap: 12px;
    }
    .audio-card {
      border: 1px solid rgba(24,50,59,.12);
      border-radius: 8px;
      background: #f8fbfa;
      padding: 14px;
      display: grid;
      gap: 9px;
    }
    .audio-card strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    .audio-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    audio {
      width: 100%;
      height: 42px;
    }
    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      background: #e7f4f1;
      color: #176072;
    }
    .source {
      color: #57707b;
      font-size: 13px;
      font-weight: 850;
    }
    .recommend-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .recommend-card {
      border: 1px solid rgba(24,50,59,.12);
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      min-height: 100%;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .recommend-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(29, 54, 61, .12);
    }
    .recommend-card img {
      width: 100%;
      height: 132px;
      object-fit: cover;
      display: block;
    }
    .recommend-card div {
      padding: 13px;
      display: grid;
      gap: 8px;
    }
    .recommend-card strong {
      font-size: 17px;
      line-height: 1.25;
    }
    .recommend-card span {
      color: var(--sea);
      font-size: 12px;
      font-weight: 900;
    }
    .recommend-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.58;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .library {
        position: relative;
        top: auto;
        min-height: auto;
        max-height: none;
      }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); max-height: 620px; }
      .recommend-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .top-inner { height: auto; min-height: 68px; align-items: flex-start; padding: 14px 0; flex-direction: column; }
      .nav { justify-content: flex-start; }
      .hero { padding-top: 30px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .recommend-grid { grid-template-columns: 1fr; }
      .detail-hero img { height: 340px; }
      .detail-title { left: 20px; right: 20px; }
      .detail-body { padding: 22px 20px 26px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="/h5/">japan-travel.info<span>Kansai Travel Guide</span></a>
      <nav class="nav">
        <a class="pill" href="/h5/">首页</a>
        <a class="pill" href="/spots/">景点资料库</a>
        <div class="lang" aria-label="Language">
          <button type="button" data-lang="ja">JP</button>
          <button type="button" data-lang="zh">CN</button>
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="ko">KR</button>
          <button type="button" data-lang="zhHant">繁</button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div>
        <h1>关西景点资料库</h1>
      </div>
    </section>

    <section class="layout">
      <aside class="library">
        <div class="tools">
          <input id="search" class="search" type="search" placeholder="搜索景点、城市、标签" autocomplete="off" />
          <div class="filters" id="filters"></div>
        </div>
        <div class="grid" id="spotGrid"></div>
      </aside>

      <article class="detail" id="detail">
        <div class="empty">正在读取 GUIDE 景点资料...</div>
      </article>
    </section>
  </main>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));
    const params = new URLSearchParams(location.search);
    const supportedLangs = ["ja", "zh", "en", "ko", "zhHant"];
    const state = {
      spots: [],
      regions: [],
      region: "all",
      query: "",
      selected: "",
      lang: supportedLangs.includes(params.get("lang")) ? params.get("lang") : (localStorage.getItem("kansai-h5-lang") || "zh"),
    };

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function pathSpotId() {
      const parts = location.pathname.split("/").filter(Boolean);
      if (parts[0] === "spots" && parts[1]) return parts[1].toLowerCase();
      return "";
    }
    const isSpotDetailPage = Boolean(pathSpotId());
    document.body.classList.toggle("spot-detail-page", isSpotDetailPage);

    function filteredSpots() {
      const q = state.query.trim().toLowerCase();
      return state.spots.filter((spot) => {
        const regionMatch = state.region === "all" || spot.region === state.region;
        if (!regionMatch) return false;
        if (!q) return true;
        const haystack = [
          spot.name,
          spot.region,
          spot.city,
          spot.category,
          ...(spot.tags || []),
          ...(spot.best_for || []),
          spot.intro,
        ].join(" ").toLowerCase();
        return haystack.includes(q);
      });
    }

    function renderLang() {
      $$(".lang button").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === state.lang);
      });
    }

    function renderFilters() {
      const options = ["all", ...state.regions];
      $("#filters").innerHTML = options.map((region) => `
        <button type="button" class="filter ${region === state.region ? "active" : ""}" data-region="${esc(region)}">
          ${region === "all" ? "全部" : esc(region)}
        </button>
      `).join("");
      $$(".filter").forEach((button) => {
        button.addEventListener("click", () => {
          state.region = button.dataset.region;
          renderFilters();
          renderGrid();
        });
      });
    }

    function renderGrid() {
      const spots = filteredSpots();
      $("#spotGrid").innerHTML = spots.map((spot) => `
        <a class="spot-card ${spot.id === state.selected ? "active" : ""}" href="/spots/${esc(spot.id)}/?lang=${esc(state.lang)}" data-id="${esc(spot.id)}">
          <img src="${esc(spot.image)}" alt="${esc(spot.name)}" loading="lazy">
          <div>
            <strong>${esc(spot.name)}</strong>
            <span>${esc(spot.region || "")} · ${esc(spot.city || "")}</span>
          </div>
        </a>
      `).join("") || `<div class="empty">没有找到匹配的景点。</div>`;

      $$("#spotGrid .spot-card").forEach((card) => {
        card.addEventListener("click", (event) => {
          event.preventDefault();
          selectSpot(card.dataset.id, true);
        });
      });
    }

    function selectSpot(id, pushUrl) {
      const spot = state.spots.find((item) => item.id === id) || filteredSpots()[0] || state.spots[0];
      if (!spot) return;
      state.selected = spot.id;
      if (pushUrl) history.pushState({}, "", `/spots/${spot.id}/?lang=${state.lang}`);
      renderGrid();
      renderDetail(spot);
      if (pushUrl) window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function relatedSpots(spot) {
      const tags = new Set([...(spot.tags || []), ...(spot.best_for || [])].filter(Boolean));
      return state.spots
        .filter((item) => item.id !== spot.id)
        .map((item) => {
          const itemTags = [...(item.tags || []), ...(item.best_for || [])];
          const tagScore = itemTags.filter((tag) => tags.has(tag)).length;
          const regionScore = item.region && item.region === spot.region ? 4 : 0;
          const cityScore = item.city && item.city === spot.city ? 2 : 0;
          return { ...item, score: regionScore + cityScore + tagScore };
        })
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
        .slice(0, 6);
    }

    function recommendCards(spot) {
      const related = relatedSpots(spot);
      const fallback = state.spots.filter((item) => item.id !== spot.id).slice(0, 6);
      return (related.length ? related : fallback).map((item) => `
        <a class="recommend-card" href="/spots/${esc(item.id)}/?lang=${esc(state.lang)}" data-recommend-spot="${esc(item.id)}">
          <img src="${esc(item.image)}" alt="${esc(item.name)}" loading="lazy">
          <div>
            <span>${esc(item.region || "")} · ${esc(item.city || "")}</span>
            <strong>${esc(item.name)}</strong>
            <p>${esc(item.intro || "")}</p>
          </div>
        </a>
      `).join("");
    }

    const audioCopy = {
      zh: {
        title: "语音讲解",
        standardTitle: "标准版讲解",
        standardDesc: "适合先听一遍，快速掌握景点背景、看点和参观节奏。",
        classTitle: "Class 版讲解",
        classDesc: "更像完整导览稿，适合想听得更细、节奏更完整的时候播放。",
      },
      ja: {
        title: "音声ガイド",
        standardTitle: "標準版ガイド",
        standardDesc: "まず全体像をつかむための、背景・見どころ・歩き方の短い解説です。",
        classTitle: "Class版ガイド",
        classDesc: "より完整な案内として、少し詳しく聞きたい時に向いています。",
      },
      en: {
        title: "Audio Guide",
        standardTitle: "Standard Version",
        standardDesc: "A quick overview of the background, highlights and suggested pace before you visit.",
        classTitle: "Class Version",
        classDesc: "A fuller guide-style track for a slower, more detailed listen.",
      },
      ko: {
        title: "오디오 가이드",
        standardTitle: "표준판 해설",
        standardDesc: "방문 전에 배경, 볼거리, 관람 흐름을 빠르게 이해하기 좋은 해설입니다.",
        classTitle: "Class판 해설",
        classDesc: "조금 더 자세하고 완성된 가이드 흐름으로 듣기 좋은 버전입니다.",
      },
      zhHant: {
        title: "語音講解",
        standardTitle: "標準版講解",
        standardDesc: "適合先聽一遍，快速掌握景點背景、看點和參觀節奏。",
        classTitle: "Class 版講解",
        classDesc: "更像完整導覽稿，適合想聽得更細、節奏更完整的時候播放。",
      },
    };

    function audioText(key) {
      return (audioCopy[state.lang] && audioCopy[state.lang][key]) || audioCopy.zh[key] || key;
    }

    function renderDetail(spot) {
      const tags = [...(spot.best_for || []), ...(spot.tags || [])].filter(Boolean).slice(0, 10);
      $("#detail").innerHTML = `
        <div class="detail-hero">
          <img src="${esc(spot.image)}" alt="${esc(spot.name)}">
          <div class="detail-title">
            <div class="meta">
              <span>${esc(spot.region || "")}</span>
              <span>${esc(spot.city || "")}</span>
              <span>${esc(spot.category || "")}</span>
              <span>${esc(spot.duration || "")}</span>
            </div>
            <h2>${esc(spot.name)}</h2>
          </div>
        </div>
        <div class="detail-body">
          <p class="lead">${esc(spot.intro)}</p>
          <div class="section audio-row">
            <h3>${esc(audioText("title"))}</h3>
            <div class="audio-card">
              <strong>${esc(audioText("standardTitle"))}</strong>
              <p>${esc(audioText("standardDesc"))}</p>
              <audio controls preload="none" src="${esc(spot.audio)}"></audio>
            </div>
            <div class="audio-card">
              <strong>${esc(audioText("classTitle"))}</strong>
              <p>${esc(audioText("classDesc"))}</p>
              <audio controls preload="none" src="${esc(spot.classic_audio || spot.audio)}"></audio>
            </div>
          </div>
          ${spot.tip ? `<div class="section"><h3>行程提示</h3><p class="script">${esc(spot.tip)}</p></div>` : ""}
          ${spot.audio_script ? `<div class="section"><h3>文字讲解</h3><p class="script">${esc(spot.audio_script)}</p></div>` : ""}
          ${tags.length ? `<div class="section"><h3>标签</h3><div class="tag-row">${tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join("")}</div></div>` : ""}
          ${spot.source_url ? `<a class="source" href="${esc(spot.source_url)}" target="_blank" rel="noopener">参考信息来源</a>` : ""}
          <div class="section">
            <h3>相关景点推荐</h3>
            <div class="recommend-grid">${recommendCards(spot)}</div>
          </div>
        </div>
      `;
      $$("#detail [data-recommend-spot]").forEach((card) => {
        card.addEventListener("click", (event) => {
          event.preventDefault();
          selectSpot(card.dataset.recommendSpot, true);
        });
